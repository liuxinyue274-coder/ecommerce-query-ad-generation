[theme]
primaryColor = "#B8985C"
backgroundColor = "#FAFAF9"
secondaryBackgroundColor = "#F5F5F4"
textColor = "#1C1917"
font = "sans serif"
base = "light"

[browser]
gatherUsageStats = false

[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
